<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">UX3 Knowledge State Matrix</title>
  <desc id="desc">Four dimensions classify durable product knowledge by time, epistemic state, space, and authority status, with a mandatory metadata envelope.</desc>
  <rect width="1200" height="820" fill="#fbfaf7"/>
  <text x="72" y="78" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800" fill="#1f2933">Knowledge State Matrix</text>
  <text x="72" y="116" font-family="Inter, Arial, sans-serif" font-size="19" fill="#66727a">A reusable record must expose all four coordinates.</text>
  <text x="1044" y="82" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#8b5f2a">PLATE 06</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(72 166)">
      <text x="0" y="31" font-size="14" font-weight="700" fill="#66727a">TIME</text>
      <rect x="170" y="0" width="276" height="58" fill="#e9ece7"/>
      <rect x="456" y="0" width="276" height="58" fill="#dce8e3"/>
      <text x="308" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">PAST</text>
      <text x="594" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">PRESENT</text>
      <text x="760" y="24" font-size="15" fill="#66727a">When does the statement govern?</text>
      <text x="760" y="47" font-size="15" fill="#66727a">Expired context remains traceable.</text>
    </g>

    <g transform="translate(72 244)">
      <text x="0" y="31" font-size="14" font-weight="700" fill="#66727a">EPISTEMIC</text>
      <rect x="170" y="0" width="180" height="58" fill="#dce8e3"/>
      <rect x="360" y="0" width="180" height="58" fill="#f1e5d8"/>
      <rect x="550" y="0" width="182" height="58" fill="#eadedb"/>
      <text x="260" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">KNOWN</text>
      <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">UNKNOWN</text>
      <text x="641" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">ASSUMPTION</text>
      <text x="760" y="24" font-size="15" fill="#66727a">Gap, claim, or supported knowledge?</text>
      <text x="760" y="47" font-size="15" fill="#66727a">Unknown is never silent support.</text>
    </g>

    <g transform="translate(72 322)">
      <text x="0" y="31" font-size="14" font-weight="700" fill="#66727a">SPACE</text>
      <rect x="170" y="0" width="276" height="58" fill="#e3e7ec"/>
      <rect x="456" y="0" width="276" height="58" fill="#ece5d9"/>
      <text x="308" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">INTERNAL</text>
      <text x="594" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2933">EXTERNAL</text>
      <text x="760" y="24" font-size="15" fill="#66727a">Where did the record originate?</text>
      <text x="760" y="47" font-size="15" fill="#66727a">Location does not determine strength.</text>
    </g>

    <g transform="translate(72 400)">
      <text x="0" y="31" font-size="14" font-weight="700" fill="#66727a">AUTHORITY</text>
      <rect x="170" y="0" width="133" height="58" fill="#e9ece7"/>
      <rect x="313" y="0" width="133" height="58" fill="#dce8e3"/>
      <rect x="456" y="0" width="133" height="58" fill="#f1e5d8"/>
      <rect x="599" y="0" width="133" height="58" fill="#eadedb"/>
      <text x="236" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2933">CANDIDATE</text>
      <text x="379" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2933">CANONICAL</text>
      <text x="522" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2933">CONFLICTED</text>
      <text x="665" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2933">SUPERSEDED</text>
      <text x="760" y="24" font-size="15" fill="#66727a">What may govern a decision now?</text>
      <text x="760" y="47" font-size="15" fill="#66727a">Conflict and replacement stay visible.</text>
    </g>
  </g>

  <line x1="72" y1="508" x2="1128" y2="508" stroke="#cfc8bb" stroke-width="2"/>
  <text x="72" y="558" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#8b5f2a">MANDATORY RECORD ENVELOPE</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(72 586)">
      <rect x="0" y="0" width="190" height="94" fill="#1f2933"/>
      <text x="20" y="35" font-size="17" font-weight="700" fill="#fbfaf7">SOURCE</text>
      <text x="20" y="64" font-size="14" fill="#d8d0c2">id, type, URI</text>
    </g>
    <g transform="translate(278 586)">
      <rect x="0" y="0" width="190" height="94" fill="#2f5d59"/>
      <text x="20" y="35" font-size="17" font-weight="700" fill="#fbfaf7">VALID TIME</text>
      <text x="20" y="64" font-size="14" fill="#e2ece7">from, until, checked</text>
    </g>
    <g transform="translate(484 586)">
      <rect x="0" y="0" width="190" height="94" fill="#6f604e"/>
      <text x="20" y="35" font-size="17" font-weight="700" fill="#fbfaf7">CONFIRMED BY</text>
      <text x="20" y="64" font-size="14" fill="#eee7dc">actor, role, time</text>
    </g>
    <g transform="translate(690 586)">
      <rect x="0" y="0" width="190" height="94" fill="#8b5f2a"/>
      <text x="20" y="35" font-size="17" font-weight="700" fill="#fbfaf7">SENSITIVITY</text>
      <text x="20" y="64" font-size="14" fill="#f4e9dc">routing boundary</text>
    </g>
    <g transform="translate(896 586)">
      <rect x="0" y="0" width="232" height="94" fill="#7a3f39"/>
      <text x="20" y="35" font-size="17" font-weight="700" fill="#fbfaf7">RELATIONSHIPS</text>
      <text x="20" y="64" font-size="14" fill="#f2e4e1">replace, conflict, trace</text>
    </g>
  </g>

  <text x="72" y="742" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2933">Reuse rule</text>
  <text x="190" y="742" font-family="Inter, Arial, sans-serif" font-size="18" fill="#66727a">No record may cross a session, decision, team, or product boundary without this envelope.</text>
</svg>
