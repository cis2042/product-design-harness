name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m unittest discover -s tests -v
      - run: python scripts/validate.py
      - run: python scripts/check_review.py examples/quick-gate-review.json
      - run: python scripts/check_review.py examples/standard-gate-review.json
      - run: python scripts/check_review.py examples/ux3-council-review.json
      - run: python scripts/check_review.py examples/live-coding-review.json
