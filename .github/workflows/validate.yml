name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m unittest discover -s tests -v
      - run: python scripts/validate.py
      - run: python scripts/check_review.py examples/quick-gate-review.json
      - run: python scripts/check_review.py examples/standard-gate-review.json
      - run: python scripts/check_review.py examples/ux3-council-review.json
      - run: python scripts/check_review.py examples/live-coding-review.json

  install-smoke:
    runs-on: ubuntu-latest
    env:
      SKILL_HOME: ${{ runner.temp }}/skill-install-home
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install the complete local skill bundle
        run: |
          mkdir -p "$SKILL_HOME"
          HOME="$SKILL_HOME" npx -y skills add . -g -a universal -y --copy
          bundle="$SKILL_HOME/.agents/skills/product-design-harness"
          test -f "$bundle/SKILL.md"
          test -f "$bundle/resources/schemas/review-result.schema.json"
          test -f "$bundle/resources/scripts/check_review.py"
      - name: Validate an installed golden review
        run: |
          bundle="$SKILL_HOME/.agents/skills/product-design-harness"
          python -m pip install -r "$bundle/resources/requirements-dev.txt"
          python "$bundle/resources/scripts/check_review.py" \
            "$bundle/resources/examples/quick-gate-review.json"
