  <text x="84" y="112" font-family='"SF Mono", Menlo, Consolas, monospace' font-size="26" letter-spacing="5" fill="#1E6B4F">PRODUCT DESIGN HARNESS</text>
  <text x="996" y="112" text-anchor="end" font-family='"SF Mono", Menlo, Consolas, monospace' font-size="26" letter-spacing="3" fill="#5A615C">03 / 10</text>

  <text x="84" y="300" font-family='Georgia, "Times New Roman", serif' font-size="86" fill="#1A1D1B">Every direction answers</text>
  <text x="84" y="300" font-family='Georgia, "Times New Roman", serif' font-size="86" fill="#1A1D1B" dy="100">to three flows.</text>

  <rect x="84" y="400" width="18" height="110" fill="#1A1D1B"/>
  <text x="140" y="444" font-family='"SF Mono", Menlo, Consolas, monospace' font-size="36" letter-spacing="3" fill="#1A1D1B">USER FLOW</text>
  <text x="140" y="494" font-family='-apple-system, "Segoe UI", Helvetica, Arial, sans-serif' font-size="33" fill="#5A615C">Is the actor, problem, and consequence real?</text>
  <rect x="84" y="560" width="18" height="110" fill="#1E6B4F"/>
  <text x="140" y="604" font-family='"SF Mono", Menlo, Consolas, monospace' font-size="36" letter-spacing="3" fill="#1E6B4F">EVIDENCE FLOW</text>
  <text x="140" y="654" font-family='-apple-system, "Segoe UI", Helvetica, Arial, sans-serif' font-size="33" fill="#5A615C">Is the proof strong enough for the next step?</text>
  <rect x="84" y="720" width="18" height="110" fill="#9A6B15"/>
  <text x="140" y="764" font-family='"SF Mono", Menlo, Consolas, monospace' font-size="36" letter-spacing="3" fill="#9A6B15">BUSINESS FLOW</text>
  <text x="140" y="814" font-family='-apple-system, "Segoe UI", Helvetica, Arial, sans-serif' font-size="33" fill="#5A615C">Is there a durable value path?</text>

